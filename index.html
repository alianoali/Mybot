<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="بوت الذكاء الاصطناعي - لعبة سلوت احترافية بعد تسجيل الدخول">
  <title>بوت الذكاء الاصطناعي | لوحة التحكم</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tajawal Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Tajawal', 'sans-serif'] },
          animation: {
            float: 'float 8s ease-in-out infinite',
            spinReel: 'spinReel 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)',
            winPulse: 'winPulse 0.8s ease-in-out infinite',
            bounce: 'bounce 0.5s'
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' }
            },
            spinReel: {
              '0%': { transform: 'translateY(0)' },
              '100%': { transform: 'translateY(-200%)' }
            },
            winPulse: {
              '0%, 100%': { boxShadow: '0 0 0 0 rgba(251, 191, 36, 0.7)' },
              '50%': { boxShadow: '0 0 0 15px rgba(251, 191, 36, 0)' }
            },
            bounce: {
              '0%, 100%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.05)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      font-feature-settings: "rlig" 1, "calt" 1;
    }
    .floating {
      animation: float 8s ease-in-out infinite;
    }
    .hidden {
      display: none !important;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(59, 130, 246, 0.3);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* Slot Machine */
    .slot-machine {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      border: 4px solid #d4af37;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 
        0 0 20px rgba(212, 175, 55, 0.5),
        inset 0 0 15px rgba(0, 0, 0, 0.8);
      position: relative;
      overflow: hidden;
    }
    .reel-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
    }
    .reel {
      width: 80px;
      height: 100px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #d4af37;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .symbol {
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
    }
    .spin-btn {
      background: linear-gradient(135deg, #d4af37, #b8860b);
      color: #1a1a2e;
      font-weight: bold;
      padding: 14px 40px;
      border-radius: 50px;
      font-size: 1.2rem;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 6px 15px rgba(212, 175, 55, 0.4);
    }
    .spin-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.6);
    }
    .spin-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .win-message {
      font-size: 1.4rem;
      font-weight: bold;
      color: #fbbf24;
      text-shadow: 0 0 15px rgba(251, 191, 36, 0.8);
      animation: winPulse;
      margin: 15px 0;
      min-height: 36px;
    }
    /* Profile Card */
    .profile-card {
      background: rgba(30, 41, 59, 0.7);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .balance-badge {
      background: linear-gradient(135deg, #fbbf24, #d97706);
      color: #1a1a2e;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.9rem;
    }
    #g_id_onload {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
    }
  </style>
</head>
<body class="text-gray-100">

  <!-- Google Identity Services -->
  <div id="g_id_onload"
    data-client_id="751119765490-ug00sfscqh4uvs4km9ho2buav6kdp46f.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_select="false"
    data-cancel_on_tap_outside="true">
  </div>

  <!-- شاشة تسجيل الدخول -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-slate-900/80 backdrop-blur-lg border border-slate-700 rounded-2xl p-8 w-full max-w-md text-center shadow-2xl">
      <div class="mb-6">
        <div class="mx-auto w-16 h-16 rounded-2xl bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white">مرحباً بك في بوت الذكاء الاصطناعي</h1>
        <p class="text-gray-400 mt-2 text-sm">سجّل الدخول بحساب Google لإنشاء حسابك والوصول إلى لعبة السلوت الحصرية</p>
      </div>

      <button id="googleSignInBtn" class="w-full max-w-xs bg-white text-slate-900 font-semibold py-3 px-6 rounded-xl flex items-center justify-center gap-3 shadow-lg hover:shadow-xl transition-all">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.345-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z" fill="#4285F4"/>
        </svg>
        تسجيل الدخول بـ Google
      </button>

      <div class="mt-6 text-xs text-gray-500 space-y-1">
        <p>✓ يُسمح فقط بحسابات Gmail (.com)</p>
        <p>✓ بياناتك محمية وآمنة</p>
      </div>
    </div>
  </div>

  <!-- شاشة المعالجة -->
  <div id="processingScreen" class="min-h-screen flex items-center justify-center p-4 hidden">
    <div class="bg-slate-900/80 backdrop-blur-lg border border-slate-700 rounded-2xl p-8 w-full max-w-md text-center">
      <div class="spinner mb-5 mx-auto"></div>
      <p id="processingMessage" class="text-gray-300 text-lg">جارٍ التحقق من حسابك...</p>
    </div>
  </div>

  <!-- الشاشة الرئيسية (بعد تسجيل الدخول) -->
  <div id="mainScreen" class="hidden">
    <!-- شريط التنقل العلوي -->
    <header class="bg-slate-900/60 backdrop-blur-md border-b border-slate-700 sticky top-0 z-50">
      <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
          بوت الذكاء الاصطناعي
        </h1>
        <div id="profileCard" class="profile-card">
          <div class="avatar" id="avatarInitial">أ</div>
          <div>
            <div class="font-semibold text-white" id="profileName">...</div>
            <div class="text-xs text-gray-400" id="profileEmail">...</div>
          </div>
          <div class="balance-badge" id="balanceDisplay">1000 💰</div>
        </div>
      </div>
    </header>

    <!-- محتوى اللعبة -->
    <main class="container mx-auto px-4 py-8">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-white">🎮 لعبة السلوت الاحترافية</h2>
        <p class="text-gray-400 mt-2">استمتع بأفضل تجربة سلوت كما في لاس فيغاس!</p>
      </div>

      <div class="max-w-2xl mx-auto">
        <div class="slot-machine">
          <div class="reel-container" id="reelContainer"></div>
          <div class="win-message" id="winMessage"></div>
          <button id="spinBtn" class="spin-btn" disabled>🎯 ابدأ اللعبة</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Google Identity Script -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    // ======================
    // الإعدادات الأساسية
    // ======================
    const GOOGLE_CLIENT_ID = "751119765490-ug00sfscqh4uvs4km9ho2buav6kdp46f.apps.googleusercontent.com";
    const STORAGE_KEY = "ai_bot_user_v3";
    const ALLOWED_DOMAIN = "@gmail.com";

    // ======================
    // دوال المساعدة
    // ======================

    function saveUser(name, email) {
      try {
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify({ name, email, balance: 1000, timestamp: Date.now() }));
        return true;
      } catch (e) {
        console.error("فشل حفظ المستخدم:", e);
        return false;
      }
    }

    function loadUser() {
      try {
        const data = sessionStorage.getItem(STORAGE_KEY);
        if (!data) return null;
        const user = JSON.parse(data);
        if (Date.now() - user.timestamp > 24 * 60 * 60 * 1000) {
          sessionStorage.removeItem(STORAGE_KEY);
          return null;
        }
        return user;
      } catch (e) {
        return null;
      }
    }

    function showProcessing(message = "جارٍ التحقق من حسابك...") {
      document.getElementById('processingMessage').textContent = message;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('processingScreen').classList.remove('hidden');
    }

    function showError(message) {
      alert(`❌ ${message}`);
      document.getElementById('processingScreen').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
    }

    function showMainScreen(user) {
      const { name, email, balance } = user;

      // تحديث الملف الشخصي
      document.getElementById('profileName').textContent = name;
      document.getElementById('profileEmail').textContent = email;
      document.getElementById('balanceDisplay').textContent = `${balance} 💰`;
      document.getElementById('avatarInitial').textContent = name.charAt(0).toUpperCase();

      // إخفاء الشاشات الأخرى
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('processingScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');

      // تهيئة اللعبة
      initSlotMachine(balance);
    }

    // ======================
    // لعبة السلوت
    // ======================

    const SYMBOLS = ['🍒', '🍋', '🍉', '🍇', '7️⃣', '💎', 'BAR'];
    const SYMBOL_VALUES = { '🍒': 2, '🍋': 3, '🍉': 4, '🍇': 5, '7️⃣': 10, '💎': 15, 'BAR': 20 };
    let currentBalance = 1000;
    let isSpinning = false;

    function initSlotMachine(balance) {
      currentBalance = balance;
      createReels();
      document.getElementById('spinBtn').disabled = false;
      document.getElementById('spinBtn').textContent = '🎯 ابدأ اللعبة';
    }

    function createReels() {
      const container = document.getElementById('reelContainer');
      container.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        const reel = document.createElement('div');
        reel.className = 'reel';
        const symbolsDiv = document.createElement('div');
        symbolsDiv.style.display = 'flex';
        symbolsDiv.style.flexDirection = 'column';
        symbolsDiv.style.width = '100%';
        symbolsDiv.style.textAlign = 'center';
        for (let j = 0; j < 10; j++) {
          const symbol = document.createElement('div');
          symbol.className = 'symbol';
          symbol.textContent = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
          symbolsDiv.appendChild(symbol);
        }
        reel.appendChild(symbolsDiv);
        container.appendChild(reel);
      }
    }

    function spinReels() {
      if (isSpinning || currentBalance < 100) return;

      isSpinning = true;
      currentBalance -= 100;
      document.getElementById('balanceDisplay').textContent = `${currentBalance} 💰`;
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('winMessage').textContent = '';

      const reels = [];
      for (let i = 0; i < 5; i++) {
        const reelEl = document.querySelector(`#reelContainer .reel:nth-child(${i + 1})`);
        const symbolsDiv = reelEl.firstChild;
        symbolsDiv.innerHTML = '';
        const newSymbols = [];
        for (let j = 0; j < 10; j++) {
          const sym = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
          newSymbols.push(sym);
          const div = document.createElement('div');
          div.className = 'symbol';
          div.textContent = sym;
          symbolsDiv.appendChild(div);
        }
        reels.push(newSymbols);

        // تأثير الدوران
        reelEl.style.animation = 'none';
        setTimeout(() => {
          reelEl.style.animation = 'spinReel 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        }, 10);
      }

      setTimeout(() => {
        const result = reels.map(r => r[0]);
        const win = calculateWin(result);
        if (win > 0) {
          currentBalance += win;
          document.getElementById('balanceDisplay').textContent = `${currentBalance} 💰`;
          document.getElementById('winMessage').textContent = `🎉 فوز! ${win} 💰`;
          document.querySelector('.slot-machine').style.animation = 'bounce 0.5s';
          setTimeout(() => document.querySelector('.slot-machine').style.animation = '', 500);
        }
        isSpinning = false;
        document.getElementById('spinBtn').disabled = false;
        document.getElementById('spinBtn').textContent = '🎯 ابدأ اللعبة';

        // حفظ الرصيد الجديد
        const userData = loadUser();
        if (userData) {
          userData.balance = currentBalance;
          sessionStorage.setItem(STORAGE_KEY, JSON.stringify(userData));
        }
      }, 600);
    }

    function calculateWin(result) {
      if (result.every(s => s === result[0])) return 100 * SYMBOL_VALUES[result[0]] * 5;
      if (result.slice(0, 4).every(s => s === result[0]) || result.slice(1, 5).every(s => s === result[1])) return 100 * SYMBOL_VALUES[result[0]] * 3;
      if (result.slice(0, 3).every(s => s === result[0]) || result.slice(1, 4).every(s => s === result[1]) || result.slice(2, 5).every(s => s === result[2])) return 100 * SYMBOL_VALUES[result[0]] * 2;
      return 0;
    }

    // ======================
    // معالجة تسجيل الدخول
    // ======================

    window.handleCredentialResponse = function(response) {
      if (!response?.credential) return;

      showProcessing("جارٍ التحقق من بيانات الحساب...");

      setTimeout(() => {
        try {
          const base64Url = response.credential.split('.')[1];
          const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
          const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => 
            '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
          ).join(''));
          
          const payload = JSON.parse(jsonPayload);
          const email = (payload.email || '').toLowerCase().trim();
          const name = (payload.name || 'مستخدم').trim();

          if (!email.endsWith(ALLOWED_DOMAIN)) {
            showError(`يُسمح فقط بحسابات Gmail (${ALLOWED_DOMAIN})`);
            return;
          }

          if (!saveUser(name, email)) {
            showError("فشل حفظ بيانات المستخدم");
            return;
          }

          showMainScreen({ name, email, balance: 1000 });
        } catch (e) {
          console.error("خطأ:", e);
          showError("حدث خطأ أثناء معالجة الحساب. يُرجى المحاولة مرة أخرى.");
        }
      }, 800);
    };

    // ======================
    // التهيئة عند التحميل
    // ======================

    window.onload = function () {
      const existingUser = loadUser();
      if (existingUser) {
        showProcessing("جارٍ استعادة الجلسة...");
        setTimeout(() => showMainScreen(existingUser), 800);
        return;
      }

      document.getElementById('googleSignInBtn').addEventListener('click', () => {
        if (typeof google !== 'undefined') {
          google.accounts.id.prompt();
        } else {
          setTimeout(() => location.reload(), 1000);
        }
      });

      document.getElementById('spinBtn').addEventListener('click', spinReels);
    };
  </script>
</body>
</html>
