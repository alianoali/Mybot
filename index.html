<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>بوت الذكاء الاصطناعي | تسجيل الدخول</title>
  <!-- Tailwind CSS + Tajawal Font -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Tajawal', 'sans-serif']
          },
          animation: {
            float: 'float 6s ease-in-out infinite',
            pulseSlow: 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite'
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-12px)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    .auth-card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.5);
      border-radius: 24px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .auth-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px -5px rgba(0, 0, 0, 0.6);
    }
    .google-btn {
      background: white;
      color: #1e293b;
      font-weight: 600;
      padding: 0.875rem 1.5rem;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.875rem;
      cursor: pointer;
      transition: all 0.25s ease;
      width: 100%;
      max-width: 320px;
      font-size: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .google-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    }
    .google-btn:active {
      transform: translateY(0);
    }
    .success-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      color: #10b981;
    }
    .logo-circle {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    }
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    .hidden {
      display: none !important;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="flex items-center justify-center p-4 relative">

  <!-- خلفية رسومية -->
  <div class="absolute inset-0 overflow-hidden -z-10">
    <svg class="absolute top-0 left-0 w-full h-full opacity-10" viewBox="0 0 1440 800">
      <circle cx="200" cy="200" r="120" fill="#3b82f6" class="floating" style="animation-delay: 0s;"></circle>
      <circle cx="1200" cy="600" r="160" fill="#8b5cf6" class="floating" style="animation-delay: 1.5s;"></circle>
      <circle cx="700" cy="100" r="80" fill="#60a5fa" class="floating" style="animation-delay: 3s;"></circle>
    </svg>
  </div>

  <!-- شاشة تسجيل الدخول -->
  <div id="loginScreen" class="auth-card p-8 w-full max-w-md text-center">
    <div class="mb-6">
      <div class="mx-auto logo-circle w-16 h-16 rounded-2xl flex items-center justify-center mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">مرحباً بك في بوت الذكاء الاصطناعي</h1>
      <p class="text-gray-400 mt-2 text-sm">سجّل الدخول بحساب Google لإنشاء حسابك تلقائياً</p>
    </div>

    <button id="googleSignInBtn" class="google-btn mx-auto">
      <svg class="w-5 h-5" viewBox="0 0 24 24">
        <path d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.345-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z" fill="#4285F4"/>
      </svg>
      تسجيل الدخول بـ Google
    </button>

    <div class="mt-6 text-xs text-gray-500 space-y-1">
      <p>✓ يُسمح فقط بحسابات Gmail (.com)</p>
      <p>✓ سيتم إنشاء حسابك تلقائياً عند التحقق</p>
    </div>
  </div>

  <!-- شاشة النجاح -->
  <div id="successScreen" class="auth-card p-8 w-full max-w-md text-center hidden">
    <svg class="success-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    <h2 class="text-xl font-bold text-white mb-2">تم إنشاء حسابك بنجاح!</h2>
    <p id="welcomeMessage" class="text-gray-300 mb-4">مرحباً بك، <span id="userName" class="font-semibold text-blue-400">...</span></p>
    <div class="flex items-center justify-center gap-2 text-sm text-gray-400">
      <div class="spinner"></div>
      <span>جارٍ التوجيه إلى لوحة التحكم...</span>
    </div>
  </div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    const GOOGLE_CLIENT_ID = "751119765490-ug00sfscqh4uvs4km9ho2buav6kdp46f.apps.googleusercontent.com";

    window.onload = function () {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: true
      });

      document.getElementById('googleSignInBtn').addEventListener('click', () => {
        google.accounts.id.prompt();
      });
    };

    function handleCredentialResponse(response) {
      if (!response?.credential) return;

      try {
        const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        const email = payload.email || '';
        const name = payload.name || 'مستخدم';

        if (!email.endsWith('@gmail.com')) {
          alert('❌ يُسمح فقط بحسابات Gmail (.com)');
          return;
        }

        simulateAccountCreation(name, email);
      } catch (e) {
        console.error("خطأ في تحليل بيانات Google:", e);
        alert("حدث خطأ أثناء معالجة بيانات الحساب.");
      }
    }

    function simulateAccountCreation(name, email) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('userName').textContent = name;
      document.getElementById('welcomeMessage').textContent = `مرحباً بك، ${name}!`;
      document.getElementById('successScreen').classList.remove('hidden');

      // محاكاة التوجيه بعد 3 ثوانٍ
      setTimeout(() => {
        alert("✅ تم تسجيل الدخول بنجاح! (في التطبيق الحقيقي: سيتم تحويلك إلى لوحة التحكم)");
      }, 3000);
    }
  </script>
</body>
</html>
